{% extends "base.html" %}
{% block extrastyle %}
<style>
  .form-container {
    margin-left: auto; /* Keeps container left-aligned */
    margin-right: auto; /* Ensures consistent spacing on the right */
    padding: 0 20px; /* Adds padding inside the container on both left and right sides */
    max-width: 600px; /* Maximum width of the container, adjust as needed */
}

</style>
{% endblock %}
{% block content %}
<div class="form-container">
  <fieldset>
    <legend>Sign up</legend>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <p>Please don't forget your password. If you do, you have to email us.</p>
      <button type="submit" class="btn btn-default">Sign up</button>
    </form>
  </fieldset>
</div>
{% endblock %}
